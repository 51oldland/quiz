const QUESTIONS = [{"id": "j1", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "煤矿企业要保证“安全第一，预防为主，综合治理”方针的具体落实，必须严格执行《煤矿安全规程》等相关规定。", "answer": "√", "score": 2}, {"id": "j2", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "煤矿安全监察机构依法行使职权，不受任何组织和个人的非法干涉。", "answer": "√", "score": 2}, {"id": "j3", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "煤矿没有领导带班下井的，煤矿从业人员有权拒绝下井作业。", "answer": "√", "score": 2}, {"id": "j4", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "生产经营单位的从业人员不服从管理，违反安全生产规章制度或者操作规程的，由生产经营单位给予批评教育，依照有关规章制度给予处分。", "answer": "√", "score": 2}, {"id": "j5", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "生产经营单位可以不把作业场所和工作岗位存在的危险因素如实告知从业人员，以免产生负面影响，不利于生产。", "answer": "×", "score": 2}, {"id": "j6", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "按粉尘存在状态可以分成浮尘和落尘。浮尘的危害最大。", "answer": "√", "score": 2}, {"id": "j7", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "当混合气体中瓦斯浓度大于16%时，仍然会燃烧和爆炸。", "answer": "×", "score": 2}, {"id": "j8", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "井下用风地点的回风再次进入其他用风地点的通风方式称为串联通风。", "answer": "√", "score": 2}, {"id": "j9", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "井下主要水泵房、井下中央变电所、矿井地面变电所和地面通风机房的电话，应能与矿调度室直接联系。", "answer": "√", "score": 2}, {"id": "j10", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "掘进工作面断面小、落煤量小，瓦斯涌出量也相对较小，发生瓦斯事故的可能性也较小。", "answer": "×", "score": 2}, {"id": "j11", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "矿井通风可以采用局部通风机或风机群作为主要通风机使用。", "answer": "×", "score": 2}, {"id": "j12", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "掘进巷道可以使用3台以上（含3台）的局部通风机同时向1个掘进工作面供风。", "answer": "×", "score": 2}, {"id": "j13", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "矿井瓦斯是煤岩涌出的各种气体的总称，其主要成分是甲烷，有时也专指甲烷一种气体。", "answer": "√", "score": 2}, {"id": "j14", "type": "judge", "section": "第一章 判断题（每题2分，共60分）", "q": "矿井有下列情况之一的，应当立即进行突出煤层鉴定；鉴定未完成前，应当按照突出煤层管理。①煤层有瓦斯动力现象的；②相邻矿井开采的同一煤层发生突出的；③煤层瓦斯压力达到或者超过0.74MPa的。", "answer": "√", "score       const st = document.createElement('div');
      st.className = 'section-title';
      st.textContent = q.section;
      container.appendChild(st);
    }
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.id;

    const badgeMap = {single:'\u5355\u9009', multi:'\u591a\u9009', judge:'\u5224\u65ad'};
    const badgeClass = {single:'badge-single', multi:'badge-multi', judge:'badge-judge'};
    card.innerHTML = `
      <div>
        <span class="q-num">${idx+1}</span>
        <span class="q-type-badge ${badgeClass[q.type]}">${badgeMap[q.type]}</span>
      </div>
      <div class="q-text">${q.q}</div>
    `;

    if (q.type === 'single') {
      const opts = document.createElement('div');
      opts.className = 'options';
      q.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.val = opt.label;
        btn.innerHTML = `<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
        btn.onclick = () => answerSingle(q.id, opt.label, q.answer, btn, opts);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    } else if (q.type === 'multi') {
      const hint = document.createElement('div');
      hint.className = 'multi-hint';
      hint.textContent = '\uff08\u591a\u9009\u9898\uff0c\u8bf7\u9009\u62e9\u6240\u6709\u6b63\u786e\u9009\u9879\uff09';
      card.appendChild(hint);
      const opts = document.createElement('div');
      opts.className = 'options';
      q.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.val = opt.label;
        btn.dataset.selected = '0';
        btn.innerHTML = `<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
        btn.onclick = () => toggleMulti(btn, q.id);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
      const confirmWrap = document.createElement('div');
      confirmWrap.className = 'multi-confirm-wrap';
      confirmWrap.id = 'confirm-' + q.id;
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'multi-confirm-btn';
      confirmBtn.textContent = '\u786e\u8ba4\u63d0\u4ea4\u672c\u9898';
      confirmBtn.id = 'cbtn-' + q.id;
      confirmBtn.disabled = true;
      confirmBtn.onclick = () => answerMulti(q.id, q.answer, opts, confirmBtn);
      confirmWrap.appendChild(confirmBtn);
      card.appendChild(confirmWrap);
    } else if (q.type === 'judge') {
      const opts = document.createElement('div');
      opts.className = 'judge-opts';
      ['\u221a','\u00d7'].forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'judge-btn';
        btn.textContent = val;
        btn.dataset.val = val;
        btn.onclick = () => answerJudge(q.id, val, q.answer, btn, opts);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    }

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb-' + q.id;
    card.appendChild(fb);
    container.appendChild(card);
  });
}

function showFeedback(id, correct, correctAnswer) {
  const fb = document.getElementById('fb-' + id);
  fb.className = 'feedback show ' + (correct ? 'ok' : 'fail');
  fb.innerHTML = correct
    ? '\u2705 \u56de\u7b54\u6b63\u786e\uff01'
    : `\u274c \u56de\u7b54\u9519\u8bef\uff0c\u6b63\u786e\u7b54\u6848\uff1a<strong>${correctAnswer}</strong>`;
}

function answerSingle(id, val, answer, btn, opts) {
  if (userAnswers[id] !== undefined) return;
  userAnswers[id] = val;
  answeredCount++;
  updateProgress();
  const correct = val === answer;
  opts.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.val === answer) b.classList.add('correct');
    else if (b.dataset.val === val && !correct) b.classList.add('wrong');
  });
  showFeedback(id, correct, answer);
  document.getElementById('card-' + id).classList.add('answered');
}

function toggleMulti(btn, id) {
  if (userAnswers[id] !== undefined) return;
  const sel = btn.dataset.selected === '1';
  btn.dataset.selected = sel ? '0' : '1';
  btn.classList.toggle('selected', !sel);
  const opts = btn.closest('.options');
  const anySelected = opts.querySelectorAll('[data-selected="1"]').length > 0;
  document.getElementById('cbtn-' + id).disabled = !anySelected;
}

function answerMulti(id, answer, opts, confirmBtn) {
  if (userAnswers[id] !== undefined) return;
  const selected = Array.from(opts.querySelectorAll('[data-selected="1"]'))
    .map(b => b.dataset.val).sort().join('');
  const sortedAnswer = answer.split('').sort().join('');
  userAnswers[id] = selected;
  answeredCount++;
  updateProgress();
  const correct = selected === sortedAnswer;
  const correctSet = new Set(sortedAnswer.split(''));
  opts.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const isCorrect = correctSet.has(b.dataset.val);
    const isSelected = b.dataset.selected === '1';
    if (isCorrect) b.classList.add('correct');
    else if (isSelected) b.classList.add('wrong');
  });
  confirmBtn.disabled = true;
  showFeedback(id, correct, answer);
  document.getElementById('card-' + id).classList.add('answered');
}

function answerJudge(id, val, answer, btn, opts) {
  if (userAnswers[id] !== undefined) return;
  userAnswers[id] = val;
  answeredCount++;
  updateProgress();
  const correct = val === answer;
  opts.querySelectorAll('.judge-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.val === answer) b.classList.add('correct');
    else if (b.dataset.val === val && !correct) b.classList.add('wrong');
  });
  showFeedback(id, correct, answer);
  document.getElementById('card-' + id).classList.add('answered');
}

function submitQuiz() {
  let totalScore = 0, earnedScore = 0, unanswered = 0;
  let judgeC=0,judgeT=0,singleC=0,singleT=0,multiC=0,multiT=0;
  QUESTIONS.forEach(q => {
    totalScore += q.score;
    if (userAnswers[q.id] === undefined) { unanswered++; return; }
    let isCorrect = false;
    if (q.type === 'judge') {
      judgeT++;
      isCorrect = userAnswers[q.id] === q.answer;
      if(isCorrect) judgeC++;
    } else if (q.type === 'single') {
      singleT++;
      isCorrect = userAnswers[q.id] === q.answer;
      if(isCorrect) singleC++;
    } else if (q.type === 'multi') {
      multiT++;
      isCorrect = userAnswers[q.id].split('').sort().join('') === q.answer.split('').sort().join('');
      if(isCorrect) multiC++;
    }
    if (isCorrect) earnedScore += q.score;
  });
  document.getElementById('res-score').textContent = earnedScore;
  document.getElementById('res-total').textContent = '/ ' + totalScore + ' \u5206';
  let grade = '';
  if (earnedScore >= 90) grade = '\ud83c\udfc6 \u4f18\u79c0\uff01';
  else if (earnedScore >= 80) grade = '\ud83d\udc4d \u826f\u597d';
  else if (earnedScore >= 60) grade = '\u2705 \u53ca\u683c';
  else grade = '\u274c \u9700\u52a0\u5f3a\u7ec3\u4e60';
  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-detail').innerHTML =
    `\u5171 ${QUESTIONS.length} \u9898\uff0c\u5df2\u7b54 ${QUESTIONS.length - unanswered} \u9898\uff0c\u5f97\u5206 ${earnedScore}/${totalScore}<br>` +
    `\u5224\u65ad\uff1a${judgeC}/${judgeT} &nbsp; \u5355\u9009\uff1a${singleC}/${singleT} &nbsp; \u591a\u9009\uff1a${multiC}/${multiT}` +
    (unanswered > 0 ? `<br><span style="color:#e53935">\u26a0\ufe0f \u8fd8\u6709 ${unanswered} \u9898\u672a\u4f5c\u7b54</span>` : '');
  document.getElementById('result-modal').classList.add('show');
}

buildQuiz();
updateProgress();
</script>
