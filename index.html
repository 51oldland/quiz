body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f6fa;color:#333;font-size:15px;min-height:100vh}

.option-btn.wrong .option-label{background:#e53935;color:#fff}

.feedback.fail{background:#ffebee;color:#c62828}

const userAnswers = {};
let answeredCount = 0;

document.getElementById('total-count').textContent = QUESTIONS.length;

function updateProgress() {
  const pct = (answeredCount / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('answered-count').textContent = answeredCount;
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  let lastSection = '';
  QUESTIONS.forEach((q, idx) => {
    if (q.section !== lastSection) {
      lastSection = q.section;
      const st = document.createElement('div');
      st.className = 'section-title';
      st.textContent = q.section;
      container.appendChild(st);
    }
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + q.id;

    const badgeMap = {single:'单选', multi:'多选', judge:'判断'};
    const badgeClass = {single:'badge-single', multi:'badge-multi', judge:'badge-judge'};
    card.innerHTML = `
      <div>
        <span class="q-num">${idx+1}</span>
        <span class="q-type-badge ${badgeClass[q.type]}">${badgeMap[q.type]}</span>
      </div>
      <div class="q-text">${q.q}</div>
    `;

    if (q.type === 'single') {
      const opts = document.createElement('div');
      opts.className = 'options';
      q.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.val = opt.label;
        btn.innerHTML = `<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
        btn.onclick = () => answerSingle(q.id, opt.label, q.answer, btn, opts);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    } else if (q.type === 'multi') {
      const hint = document.createElement('div');
      hint.className = 'multi-hint';
      hint.textContent = '（多选题，请选择所有正确选项）';
      card.appendChild(hint);
      const opts = document.createElement('div');
      opts.className = 'options';
      q.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.val = opt.label;
        btn.dataset.selected = '0';
        btn.innerHTML = `<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
        btn.onclick = () => toggleMulti(btn, q.id);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
      const confirmWrap = document.createElement('div');
      confirmWrap.className = 'multi-confirm-wrap';
      confirmWrap.id = 'confirm-' + q.id;
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'multi-confirm-btn';
      confirmBtn.textContent = '确认提交本题';
      confirmBtn.id = 'cbtn-' + q.id;
      confirmBtn.disabled = true;
      confirmBtn.onclick = () => answerMulti(q.id, q.answer, opts, confirmBtn);
      confirmWrap.appendChild(confirmBtn);
      card.appendChild(confirmWrap);
    } else if (q.type === 'judge') {
      const opts = document.createElement('div');
      opts.className = 'judge-opts';
      ['√','×'].forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'judge-btn';
        btn.textContent = val;
        btn.dataset.val = val;
        btn.onclick = () => answerJudge(q.id, val, q.answer, btn, opts);
        opts.appendChild(btn);
      });
      card.appendChild(opts);
    }

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb-' + q.id;
    card.appendChild(fb);
    container.appendChild(card);
  });
}

function showFeedback(id, correct, correctAnswer) {
  const fb = document.getElementById('fb-' + id);
  fb.className = 'feedback show ' + (correct ? 'ok' : 'fail');
  fb.innerHTML = correct
    ? '✅ 回答正确！'
    : `❌ 回答错误，正确答案：<strong>${correctAnswer}</strong>`;
}

function answerSingle(id, val, answer, btn, opts) {
  if (userAnswers[id] !== undefined) return;
  userAnswers[id] = val;
  answeredCount++;
  updateProgress();
  const correct = val === answer;
  opts.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.val === answer) b.classList.add('correct');
    else if (b.dataset.val === val && !correct) b.classList.add('wrong');
  });
  showFeedback(id, correct, answer);
  document.getElementById('card-' + id).classList.add('answered');
}

function toggleMulti(btn, id) {
  if (userAnswers[id] !== undefined) return;
  const sel = btn.dataset.selected === '1';
  btn.dataset.selected = sel ? '0' : '1';
  btn.classList.toggle('selected', !sel);
  const opts = btn.closest('.options');
  const anySelected = opts.querySelectorAll('[data-selected="1"]').length > 0;
  document.getElementById('cbtn-' + id).disabled = !anySelected;
}

function answerMulti(id, answer, opts, confirmBtn) {
  if (userAnswers[id] !== undefined) return;
  const selected = Array.from(opts.querySelectorAll('[data-selected="1"]'))
    .map(b => b.dataset.val).sort().join('');
  const sortedAnswer = answer.replace(/\s/g,'').split('').sort().join('');
  userAnswers[id] = selected;
  answeredCount++;
  updateProgress();
  const correct = selected === sortedAnswer;
  const correctSet = new Set(sortedAnswer.split(''));
  opts.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const isCorrect = correctSet.has(b.dataset.val);
    const isSelected = b.dataset.selected === '1';
    if (isCorrect) b.classList.add('correct');
    else if (isSelected) b.classList.add('wrong');
  });
  confirmBtn.disabled = true;
  showFeedback(id, correct, answer.replace(/\s/g,''));
  document.getElementById('card-' + id).classList.add('answered');
}

function answerJudge(id, val, answer, btn, opts) {
  if (userAnswers[id] !== undefined) return;
  userAnswers[id] = val;
  answeredCount++;
  updateProgress();
  const correct = val === answer;
  opts.querySelectorAll('.judge-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.val === answer) b.classList.add('correct');
    else if (b.dataset.val === val && !correct) b.classList.add('wrong');
  });
  showFeedback(id, correct, answer);
  document.getElementById('card-' + id).classList.add('answered');
}

function submitQuiz() {
  let correct = 0, unanswered = 0;
  let singleC=0,singleT=0,multiC=0,multiT=0,judgeC=0,judgeT=0;
  QUESTIONS.forEach(q => {
    if (userAnswers[q.id] === undefined) { unanswered++; return; }
    let isCorrect = false;
    if (q.type === 'single') {
      singleT++;
      isCorrect = userAnswers[q.id] === q.answer;
      if(isCorrect) singleC++;
    } else if (q.type === 'multi') {
      multiT++;
      const sortedAnswer = q.answer.replace(/\s/g,'').split('').sort().join('');
      isCorrect = userAnswers[q.id].split('').sort().join('') === sortedAnswer;
      if(isCorrect) multiC++;
    } else {
      judgeT++;
      isCorrect = userAnswers[q.id] === q.answer;
      if(isCorrect) judgeC++;
    }
    if (isCorrect) correct++;
  });
  const total = QUESTIONS.length - unanswered;
  const score = total > 0 ? Math.round(correct / QUESTIONS.length * 100) : 0;
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-total').textContent = '/ 100 分';
  let grade = '';
  if (score >= 90) grade = '🏆 优秀！';
  else if (score >= 80) grade = '👍 良好';
  else if (score >= 60) grade = '✅ 及格';
  else grade = '❌ 需加强练习';
  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-detail').innerHTML =
    `共 ${QUESTIONS.length} 题，已答 ${QUESTIONS.length - unanswered} 题，答对 ${correct} 题<br>` +
    `单选：${singleC}/${singleT} &nbsp; 多选：${multiC}/${multiT} &nbsp; 判断：${judgeC}/${judgeT}` +
    (unanswered > 0 ? `<br><span style="color:#e53935">⚠️ 还有 ${unanswered} 题未作答</span>` : '');
  document.getElementById('result-modal').classList.add('show');

  // Also reveal answers for unanswered questions
  QUESTIONS.forEach(q => {
    if (userAnswers[q.id] !== undefined) return;
    const card = document.getElementById('card-' + q.id);
    if (q.type === 'single') {
      card.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.val === q.answer) b.classList.add('show-correct');
      });
    } else if (q.type === 'multi') {
      const correctSet = new Set(q.answer.replace(/\s/g,'').split(''));
      card.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (correctSet.has(b.dataset.val)) b.classList.add('show-correct');
      });
      const cb = document.getElementById('cbtn-' + q.id);
      if (cb) cb.disabled = true;
    } else {
      card.querySelectorAll('.judge-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.val === q.answer) b.classList.add('show-correct');
      });
    }
    const fb = document.getElementById('fb-' + q.id);
    fb.className = 'feedback show fail';
    fb.innerHTML = `⬜ 未作答，正确答案：<strong>${q.answer.replace(/\s/g,'')}</strong>`;
  });
}

buildQuiz();
updateProgress();
</script>
