<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>煤矿考试题库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f6fa;color:#333;min-height:100vh;padding:0}
.header{background:linear-gradient(135deg,#1a73e8,#0d5bba);color:#fff;padding:24px 16px;text-align:center}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;opacity:.85}
.container{max-width:600px;margin:0 auto;padding:20px 16px}
.quiz-card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-decoration:none;display:block;transition:transform .15s,box-shadow .15s}
.quiz-card:active{transform:scale(.98);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.quiz-card h2{font-size:16px;color:#1a73e8;margin-bottom:6px}
.quiz-card p{font-size:13px;color:#666;line-height:1.5}
.quiz-card .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f0fe;color:#1a73e8;margin-top:8px}
</style>
</head>
<body>
<div class="header">
  <h1>煤矿考试题库</h1>
  <p>点击选择练习科目</p>
</div>
<div class="container">
  <a class="quiz-card" href="juejin_quiz.html">
    <h2>📘 掘支工题库练习</h2>
    <p>包含单选、多选、判断题，覆盖掘进与支护工种知识要点</p>
    <span class="tag">掘支工</span>
  </a>
  <a class="quiz-card" href="fangtu_quiz.html">
    <h2>📙 防突工考试题库</h2>
    <p>判断题30题、单选20题、多选10题，总分100分，覆盖煤与瓦斯突出防治全部知识点</p>
    <span class="tag">防突工</span>
  </a>
</div>
</body>
</html>
